<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lyria Journal - Radio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .glass-bottom { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-top: 1px solid rgba(0,0,0,0.05); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .album-art-shadow { box-shadow: 0 20px 40px -15px rgba(0,0,0,0.15); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 pb-24 h-screen overflow-hidden flex flex-col">
    <!-- Sticky Header -->
    <header class="glass-nav fixed top-0 w-full z-50 h-14 flex items-center justify-center">
        <h1 class="text-lg font-bold tracking-tight text-gray-800">Radio Lyria <span class="text-xl">📻</span></h1>
    </header>

    <main class="flex-grow flex items-center justify-center max-w-md w-full mx-auto px-6 pt-20 pb-16">
        {{if .Error}}
            <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-2xl w-full text-sm font-medium">
                {{.Error}}
            </div>
        {{end}}

        <div class="w-full flex flex-col items-center">
            <div class="relative w-64 h-64 mb-10 rounded-3xl bg-gray-100 overflow-hidden album-art-shadow">
                <img id="track-image" src="" class="absolute inset-0 w-full h-full object-cover hidden transition-opacity duration-500" alt="Track Cover">
                <div id="placeholder-image" class="absolute inset-0 flex items-center justify-center bg-gradient-to-br from-indigo-50 to-blue-50 text-indigo-200">
                    <svg class="w-24 h-24" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M17.707 9.293a1 1 0 010 1.414l-7 7a1 1 0 01-1.414 0l-7-7A.997.997 0 012 10V5a3 3 0 013-3h5c.256 0 .512.098.707.293l7 7zM5 6a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd"></path></svg>
                </div>
            </div>

            <h3 id="track-title" class="text-2xl font-bold tracking-tight text-gray-900 text-center line-clamp-2 mb-2 w-full px-4">Chargement...</h3>
            <p id="track-artist" class="text-sm font-medium text-gray-500 uppercase tracking-widest mb-10">Lyria Radio</p>

            <audio id="radio-player" controls autoplay class="w-full mb-8 h-10 hide-scroll">
                Votre navigateur ne supporte pas l'élément audio.
            </audio>

            <button onclick="playNext()" class="flex items-center justify-center w-16 h-16 rounded-full bg-white text-gray-800 shadow-sm ring-1 ring-gray-200 hover:bg-gray-50 hover:scale-105 active:scale-95 transition-all duration-200">
                <svg class="w-6 h-6 ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"></path></svg>
            </button>
        </div>

        <script>
            const playlistStr = {{.PlaylistJSON}};
            const playlist = Array.isArray(playlistStr) ? playlistStr : [];
            let currentIndex = 0;
            const player = document.getElementById('radio-player');
            const titleElement = document.getElementById('track-title');
            const imageElement = document.getElementById('track-image');
            const placeholder = document.getElementById('placeholder-image');

            function loadTrack(index) {
                if (playlist.length > 0 && index >= 0 && index < playlist.length) {
                    const track = playlist[index];
                    player.src = track.url;
                    titleElement.innerText = track.title || "Sans titre";
                    if (track.image) {
                        imageElement.src = track.image;
                        imageElement.classList.remove('hidden');
                        placeholder.classList.add('hidden');
                    } else {
                        imageElement.classList.add('hidden');
                        placeholder.classList.remove('hidden');
                    }
                    player.play().catch(e => console.log("Auto-play prevented:", e));
                } else if (playlist.length === 0) {
                    titleElement.innerText = "Radio indisponible";
                    player.style.display = "none";
                }
            }

            function playNext() {
                if (playlist.length === 0) return;
                currentIndex++;
                if (currentIndex >= playlist.length) {
                    currentIndex = 0;
                }
                loadTrack(currentIndex);
            }

            player.addEventListener('ended', playNext);
            loadTrack(0);
        </script>
    </main>

    <!-- Bottom Navigation -->
    <nav class="glass-bottom fixed bottom-0 w-full pb-safe z-50">
        <div class="flex justify-around items-center h-16 max-w-md mx-auto px-6">
            <a href="/" class="flex flex-col items-center justify-center w-16 text-gray-400 hover:text-gray-900 transition-colors">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                <span class="text-[10px] font-medium">Créer</span>
            </a>
            <a href="/gallery" class="flex flex-col items-center justify-center w-16 text-gray-400 hover:text-gray-900 transition-colors">
                <svg class="w-6 h-6 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                <span class="text-[10px] font-medium">Galerie</span>
            </a>
            <a href="/radio" class="flex flex-col items-center justify-center w-16 text-blue-600">
                <svg class="w-6 h-6 mb-1" fill="currentColor" viewBox="0 0 20 20"><path d="M18 3a1 1 0 00-1.196-.98l-10 2A1 1 0 006 5v9.114A4.369 4.369 0 005 14c-1.657 0-3 .895-3 2s1.343 2 3 2 3-.895 3-2V7.28l8-1.6V11.114A4.369 4.369 0 0015 11c-1.657 0-3 .895-3 2s1.343 2 3 2 3-.895 3-2V3z"></path></svg>
                <span class="text-[10px] font-semibold">Radio</span>
            </a>
        </div>
    </nav>
</body>
</html>
